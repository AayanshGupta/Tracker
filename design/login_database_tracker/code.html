<body class="bg-surface-container-low min-h-screen flex items-center justify-center p-4 antialiased">
<div class="w-full max-w-[420px] bg-surface-container-lowest border border-border rounded-lg shadow-[0_4px_24px_-4px_rgba(15,23,42,0.04)] overflow-hidden">
<div class="p-stack-lg border-b border-border bg-surface">
<div class="text-center">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-lg bg-primary-container/10 mb-stack-md">
<span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1;">
                        database
                    </span>
</div>
<h1 class="font-headline-lg text-headline-lg text-primary">OptimaCore</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Capacity Planning &amp; Audit Tracker</p>
</div>
</div>
<div class="p-stack-lg bg-surface-container-lowest">
<form class="space-y-stack-md">
<div class="space-y-stack-sm">
<label class="block font-body-sm text-body-sm font-medium text-on-surface" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-muted text-lg">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 bg-surface border border-input rounded-lg font-body-sm text-body-sm text-on-surface placeholder-muted focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-shadow" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<div class="space-y-stack-sm">
<div class="flex items-center justify-between">
<label class="block font-body-sm text-body-sm font-medium text-on-surface" for="password">Password</label>
<a class="font-body-sm text-body-sm text-primary hover:text-surface-tint transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-muted text-lg">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 bg-surface border border-input rounded-lg font-body-sm text-body-sm text-on-surface placeholder-muted focus:outline-none focus:ring-2 focus:ring-ring focus:border-transparent transition-shadow" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<div class="flex items-center pt-2 pb-4">
<input class="h-4 w-4 text-primary focus:ring-ring border-input rounded" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-sm text-body-sm text-on-surface-variant" for="remember-me">
                        Remember me for 30 days
                    </label>
</div>
<button class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm font-body-md text-body-md font-medium text-on-primary bg-primary hover:bg-surface-tint focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-ring transition-colors" type="submit">
                    Sign In to Dashboard
                </button>
</form>
</div>
<div class="px-stack-lg py-stack-md bg-surface-container border-t border-border text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Need access? <a class="text-primary font-medium hover:text-surface-tint transition-colors" href="#">Contact IT Support</a>
</p>
</div>
</div>
